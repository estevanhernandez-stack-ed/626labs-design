<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0;height:100%;background:var(--bg-0);overflow:hidden;padding:20px;box-sizing:border-box;display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--r-md);padding:18px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
  .card.feat{background:
    radial-gradient(60% 80% at 30% 20%, rgba(23,212,250,.18) 0%, transparent 60%),
    radial-gradient(60% 80% at 80% 90%, rgba(242,47,137,.16) 0%, transparent 60%),
    var(--bg-2);
    border:1px solid rgba(23,212,250,.35)}
  .eyebrow{font-family:var(--font-mono);font-size:10px;color:var(--brand-cyan);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;font-weight:600}
  .title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--fg-1);margin:0 0 6px;letter-spacing:-.01em}
  .desc{font-size:13px;color:var(--fg-2);line-height:1.5;margin:0}
  .meta{margin-top:14px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);display:flex;gap:10px;align-items:center}
  .dot{width:6px;height:6px;border-radius:999px;background:#2bd99a;box-shadow:0 0 8px #2bd99a}
</style></head><body>
<div class="card">
  <div class="eyebrow">Plugin · /docs</div>
  <h3 class="title">Auto-documentation</h3>
  <p class="desc">Reads your codebase, writes the README you keep meaning to finish.</p>
  <div class="meta"><span class="dot"></span>Installed · v1.4.0</div>
</div>
<div class="card feat">
  <div class="eyebrow" style="color:var(--brand-magenta)">Featured</div>
  <h3 class="title">ADO Environment</h3>
  <p class="desc">Enterprise-grade Application Development Operations. Vibe-coded velocity, on rails.</p>
  <div class="meta"><span class="dot"></span>3 active workspaces</div>
</div>
</body></html>
