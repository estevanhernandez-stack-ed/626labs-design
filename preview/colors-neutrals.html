<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0;height:100%;background:var(--bg-1);overflow:hidden}
  .row{display:flex;height:100%;padding:20px;gap:4px;box-sizing:border-box}
  .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;border-radius:8px;min-width:0}
  .sw .n{font-family:var(--font-mono);font-size:10px;opacity:.85}
  .sw .h{font-family:var(--font-mono);font-size:9px;opacity:.6;margin-top:2px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#ffffff;color:#0a1524"><div class="n">ink-0</div><div class="h">#FFFFFF</div></div>
  <div class="sw" style="background:#f5f7fb;color:#0a1524"><div class="n">ink-50</div><div class="h">#F5F7FB</div></div>
  <div class="sw" style="background:#e6ebf3;color:#0a1524"><div class="n">ink-100</div><div class="h">#E6EBF3</div></div>
  <div class="sw" style="background:#c4cdda;color:#0a1524"><div class="n">ink-200</div><div class="h">#C4CDDA</div></div>
  <div class="sw" style="background:#8e9bad;color:#0a1524"><div class="n">ink-300</div><div class="h">#8E9BAD</div></div>
  <div class="sw" style="background:#5e6b7f;color:#fff"><div class="n">ink-400</div><div class="h">#5E6B7F</div></div>
  <div class="sw" style="background:#3d4a5e;color:#fff"><div class="n">ink-500</div><div class="h">#3D4A5E</div></div>
  <div class="sw" style="background:#2a3649;color:#fff"><div class="n">ink-600</div><div class="h">#2A3649</div></div>
  <div class="sw" style="background:#1e2a3d;color:#fff"><div class="n">ink-700</div><div class="h">#1E2A3D</div></div>
  <div class="sw" style="background:#152135;color:#fff"><div class="n">ink-800</div><div class="h">#152135</div></div>
  <div class="sw" style="background:#0a1524;color:#fff"><div class="n">ink-900</div><div class="h">#0A1524</div></div>
  <div class="sw" style="background:#050c18;color:#fff"><div class="n">ink-950</div><div class="h">#050C18</div></div>
</div>
</body></html>
