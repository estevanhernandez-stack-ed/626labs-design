<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0;height:100%;background:var(--bg-1);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .stage{display:flex;gap:32px;align-items:center;padding:24px 40px;width:100%}
  .logo{width:160px;height:auto;filter:drop-shadow(0 0 24px rgba(23,212,250,.25)) drop-shadow(0 0 48px rgba(242,47,137,.15))}
  .lockup{display:flex;flex-direction:column;gap:10px;flex:1}
  .wordmark{font-family:var(--font-display);font-size:44px;font-weight:700;letter-spacing:-.02em;line-height:1}
  .wordmark .six{color:var(--brand-cyan)}
  .wordmark .labs{color:var(--fg-1)}
  .tag{font-family:var(--font-display);font-style:italic;font-size:18px;color:var(--fg-2);font-weight:400}
  .hair{height:1px;background:linear-gradient(90deg,transparent,var(--brand-cyan) 20%,var(--brand-magenta) 80%,transparent);width:80%}
</style></head><body>
<div class="stage">
  <img class="logo" src="../assets/626Labs-logo.png" alt="626 Labs logo">
  <div class="lockup">
    <div class="wordmark"><span class="six">626</span><span class="labs">Labs</span> <span style="color:var(--fg-3);font-weight:500">LLC</span></div>
    <div class="hair"></div>
    <div class="tag">Imagine Something Else.</div>
  </div>
</div>
</body></html>
