<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0;height:100%;background:var(--bg-1);overflow:hidden;padding:20px;box-sizing:border-box;display:flex;align-items:center;justify-content:center;gap:18px}
  .r{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:72px;background:var(--bg-2);border:1px solid var(--border-2);box-shadow:var(--inner-stroke)}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
  .px{font-family:var(--font-mono);font-size:9px;color:var(--fg-muted)}
</style></head><body>
<div class="r"><div class="box" style="border-radius:4px"></div><div class="tok">r-xs</div><div class="px">4px</div></div>
<div class="r"><div class="box" style="border-radius:6px"></div><div class="tok">r-sm</div><div class="px">6px</div></div>
<div class="r"><div class="box" style="border-radius:10px"></div><div class="tok">r-md</div><div class="px">10px</div></div>
<div class="r"><div class="box" style="border-radius:14px"></div><div class="tok">r-lg</div><div class="px">14px</div></div>
<div class="r"><div class="box" style="border-radius:20px"></div><div class="tok">r-xl</div><div class="px">20px</div></div>
<div class="r"><div class="box" style="border-radius:28px"></div><div class="tok">r-2xl</div><div class="px">28px</div></div>
<div class="r"><div class="box" style="border-radius:999px"></div><div class="tok">r-pill</div><div class="px">999px</div></div>
</body></html>
