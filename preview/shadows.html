<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0;height:100%;background:var(--bg-1);overflow:hidden;padding:24px;box-sizing:border-box;display:flex;gap:20px;align-items:center;justify-content:center}
  .tile{width:130px;height:130px;border-radius:14px;background:var(--bg-2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:1px solid var(--border-1)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-align:center;line-height:1.4}
</style></head><body>
<div class="tile" style="box-shadow:var(--shadow-2)"><div class="lbl">shadow-2<br>drop</div></div>
<div class="tile" style="box-shadow:var(--shadow-3)"><div class="lbl">shadow-3<br>modal</div></div>
<div class="tile" style="box-shadow:0 0 0 1px rgba(23,212,250,.35), 0 0 24px rgba(23,212,250,.35)"><div class="lbl" style="color:var(--brand-cyan)">glow-cyan</div></div>
<div class="tile" style="box-shadow:0 0 0 1px rgba(242,47,137,.35), 0 0 24px rgba(242,47,137,.35)"><div class="lbl" style="color:var(--brand-magenta)">glow-magenta</div></div>
<div class="tile" style="box-shadow:0 0 24px rgba(23,212,250,.25), 0 0 48px rgba(242,47,137,.18)"><div class="lbl">glow-duo</div></div>
</body></html>
