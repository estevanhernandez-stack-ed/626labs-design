<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0;height:100%;background:var(--bg-1);overflow:hidden;padding:20px;box-sizing:border-box}
  .grid{display:flex;flex-direction:column;gap:10px;justify-content:center;height:100%}
  .row{display:flex;align-items:center;gap:14px}
  .bar{background:var(--brand-cyan);height:14px;border-radius:3px;box-shadow:0 0 12px rgba(23,212,250,.3)}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:80px}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);width:44px;text-align:right}
</style></head><body>
<div class="grid">
  <div class="row"><div class="lbl">s-1</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
  <div class="row"><div class="lbl">s-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
  <div class="row"><div class="lbl">s-3</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
  <div class="row"><div class="lbl">s-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
  <div class="row"><div class="lbl">s-5</div><div class="bar" style="width:20px"></div><div class="val">20px</div></div>
  <div class="row"><div class="lbl">s-6</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
  <div class="row"><div class="lbl">s-8</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
  <div class="row"><div class="lbl">s-10</div><div class="bar" style="width:40px"></div><div class="val">40px</div></div>
  <div class="row"><div class="lbl">s-12</div><div class="bar" style="width:48px"></div><div class="val">48px</div></div>
  <div class="row"><div class="lbl">s-16</div><div class="bar" style="width:64px"></div><div class="val">64px</div></div>
  <div class="row"><div class="lbl">s-20</div><div class="bar" style="width:80px"></div><div class="val">80px</div></div>
  <div class="row"><div class="lbl">s-24</div><div class="bar" style="width:96px"></div><div class="val">96px</div></div>
</div>
</body></html>
