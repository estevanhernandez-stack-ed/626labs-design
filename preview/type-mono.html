<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0;height:100%;background:var(--bg-1);overflow:hidden;padding:20px;box-sizing:border-box;font-family:var(--font-mono)}
  .terminal{background:var(--ink-950);border:1px solid var(--border-1);border-radius:var(--r-md);padding:16px 18px;font-size:13px;line-height:1.7;height:100%;box-sizing:border-box;box-shadow:var(--inner-stroke)}
  .prompt{color:var(--brand-cyan)}
  .flag{color:var(--brand-magenta)}
  .comment{color:var(--fg-muted)}
  .str{color:#2bd99a}
  .k{color:var(--brand-cyan-bright)}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:4px;padding:0 4px}
</style></head><body>
<div class="terminal">
<span class="comment"># JetBrains Mono · 13 / 1.7 · no ligatures</span><br>
<span class="prompt">$</span> <span class="k">626</span> plugin install <span class="flag">--docs</span> <span class="str">"./src"</span><br>
<span class="comment">›</span> <span style="color:var(--fg-2)">Analyzing 248 files…</span> <span style="color:#2bd99a">done</span><br>
<span class="comment">›</span> <span style="color:var(--fg-2)">Wrote</span> <span class="str">README.md</span>, <span class="str">docs/api.md</span>, <span class="str">docs/setup.md</span><br>
<span class="prompt">$</span> <span class="k">const</span> toolkit = <span class="k">require</span>(<span class="str">'626/toolkit'</span>)
</div>
</body></html>
